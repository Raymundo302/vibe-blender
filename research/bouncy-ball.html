<!DOCTYPE html>
<html>
<head>
<title>Bouncy Ball</title>
<style>
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(#1a1a2e 0%, #16213e 70%, #0f3460 100%);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .scene { position: relative; width: 100%; height: 100%; }
  .ball {
    position: absolute; left: 50%; bottom: 12%;
    width: 120px; height: 120px; margin-left: -60px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffb86c, #ff6b35 55%, #a8321a);
    animation: bounce 1.1s cubic-bezier(0.3, 0, 0.7, 1) infinite alternate;
    /* Pose mid-air for static rasters (Vibe Blender HTML planes render one frame). */
    animation-delay: -0.55s;
  }
  .shadow {
    position: absolute; left: 50%; bottom: 10%;
    width: 140px; height: 26px; margin-left: -70px;
    border-radius: 50%; background: rgba(0,0,0,0.45); filter: blur(6px);
    animation: squish 1.1s cubic-bezier(0.3, 0, 0.7, 1) infinite alternate;
    animation-delay: -0.55s;
  }
  .floor {
    position: absolute; left: 0; bottom: 0; width: 100%; height: 10%;
    background: #0a1128; border-top: 3px solid #e94560;
  }
  h1 {
    position: absolute; top: 6%; width: 100%; text-align: center;
    color: #e94560; font-family: monospace; font-size: 54px; letter-spacing: 4px;
  }
  @keyframes bounce {
    from { transform: translateY(0) scaleX(1.06) scaleY(0.94); }
    12%  { transform: translateY(-30px) scale(1); }
    to   { transform: translateY(-46vh) scale(1); }
  }
  @keyframes squish {
    from { transform: scale(1.15); opacity: 0.6; }
    to   { transform: scale(0.55); opacity: 0.25; }
  }
</style>
</head>
<body>
  <div class="scene">
    <h1>BOUNCY BALL</h1>
    <div class="ball"></div>
    <div class="shadow"></div>
    <div class="floor"></div>
  </div>
</body>
</html>
