<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Blender</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #232323; }
    #app { display: flex; flex-direction: column; width: 100%; height: 100%; }
    #topbar { flex: none; }
    #topbar:empty { display: none; }
    #main { flex: 1; display: flex; min-height: 0; }
    #viewport-wrap { flex: 1; position: relative; min-width: 0; }
    #viewport { width: 100%; height: 100%; display: block; cursor: default; }
    #sidebar { flex: none; width: 280px; overflow-y: auto; background: #2b2b2b; }
    #sidebar:empty { display: none; }
    #status {
      position: absolute; left: 12px; bottom: 10px;
      font: 12px/1.4 "Segoe UI", system-ui, sans-serif;
      color: #d0d0d0; background: rgba(24, 24, 24, 0.75);
      padding: 4px 10px; border-radius: 4px;
      pointer-events: none; white-space: pre;
    }
    #status:empty { display: none; }
  </style>
</head>
<body>
  <div id="app">
    <header id="topbar"></header>
    <div id="main">
      <div id="viewport-wrap">
        <canvas id="viewport"></canvas>
        <div id="status"></div>
      </div>
      <aside id="sidebar"></aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
